<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login | Holidaze</title>

  <meta
    name="description"
    content="Login to your Holidaze account."
  />

  <!-- MAIN CSS -->
  <link
    rel="stylesheet"
    href="./css/styles.css"
  />

  <!-- LOGIN PAGE CSS -->
  <link
    rel="stylesheet"
    href="./css/auth.css"
  />
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->

  <header class="site-header">
        <div class="navbar">

            <!-- LOGO -->
            <a href="index.html" class="logo">
                HOLIDAYZE
            </a>

            <!-- NAVIGATION -->
            <nav>
                <ul class="nav-links">
                    <li>
                        <a href="index.html">Home</a>
                    </li>

                    <li>
                        <a href="venues.html">Venues</a>
                    </li>

                    <li>
                        <a href="#">Destinations</a>
                    </li>

                    <li>
                        <a href="#">About</a>
                    </li>
                </ul>
            </nav>

            <!-- ACTIONS -->
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline">
                    Log in
                </a>

                <a href="register.html" class="btn btn-primary">
                    Register
                </a>
            </div>
        </div>
    </header>

  <!-- =========================
       LOGIN PAGE
  ========================== -->

  <main class="login-page">

    <!-- HUGE BACKGROUND TEXT -->
    <div class="login-background-text">
      HOLIDAYZE
    </div>

    <!-- GOLD SECTION -->
    <div class="login-gold-band"></div>

    <!-- LOGIN WRAPPER -->
    <section class="login-section">

      <!-- IMAGE -->
      <div class="login-image-wrapper">
        <img
          src="https://i.postimg.cc/Jz3DnGwm/Chat-GPT-Image-Apr-27-2026-06-15-46-PM.webp"
          alt="Luxury Holidaze venue"
        />
      </div>

      <!-- LOGIN CARD -->
      <div class="login-content">

        <h1 class="login-title">
          LOGIN
        </h1>

        <form class="login-form">

          <!-- EMAIL -->
          <div class="login-group">
            <label for="email">
              Email
            </label>

            <input
              type="email"
              id="email"
              placeholder="Enter your email"
            />
          </div>

          <!-- PASSWORD -->
          <div class="login-group">
            <label for="password">
              Password
            </label>

            <input
              type="password"
              id="password"
              placeholder="Enter your password"
            />
          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="btn btn-primary login-btn"
          >
            Login
          </button>

        </form>

      </div>
    </section>
  </main>

  <!-- =========================
       SIMPLE FOOTER
  ========================== -->

  <footer class="auth-footer">

    <p>
      © 2026 Holidaze. All rights reserved.
    </p>

    <div class="auth-footer-links">
      <a href="#">
        Privacy Policy
      </a>

      <a href="#">
        Terms of Service
      </a>
    </div>

  </footer>

</body>
</html>
